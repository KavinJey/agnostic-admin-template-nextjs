name: Auto Create Feature PR

on:
  push:
    branches:
      - 'feat*'

jobs:
  create-feature-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Get branch name
        id: vars
        run: echo "branch_name=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
      - name: Check if pull request exists
        id: pr_exists
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.FINE_GRAINED_TOKEN }}
          script: |
            const { data: pullRequests } = await github.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${process.env.branch_name}`,
              state: 'open',
            });
            return pullRequests.length > 0

      - name: Create pull request
        if: steps.pr_exists.outputs.result == 'false'
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.FINE_GRAINED_TOKEN }}
          commit-message: 'Create pull request for new feature branch'
          committer: GitHub <noreply@github.com>
          author: Your Name <your-email@example.com>
          title: 'Work in Progress: ${{ env.branch_name }}'
          body: |
            This pull request was automatically created for the feature branch `${{ env.branch_name }}`.
            - Label: work-in-progress
            - Approval: 1 approval needed
          base: dev
          branch: ${{ env.branch_name }}
          draft: true
